<!DOCTYPE html>
<html>
<head>
    <title>Our Vision Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; background: #1a1a1a; }
        .photo-marker {
            border: 3px solid white;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            object-fit: cover;
            transition: transform 0.2s;
        }
        .photo-marker:hover { transform: scale(1.5); z-index: 1000 !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([13.736, 100.523], 13);
        
        // ใช้แผนที่โทนเข้มให้เข้ากับธีม
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        fetch("ใส่_WEB_APP_URL_จาก_ขั้นตอนที่1")
            .then(res => res.json())
            .then(data => {
                data.forEach(item => {
                    const icon = L.divIcon({
                        html: `<img src="${item.url}" class="photo-marker" width="50" height="50">`,
                        className: 'custom-marker',
                        iconSize: [50, 50]
                    });

                    L.marker([item.lat, item.lng], { icon: icon })
                     .addTo(map)
                     .bindPopup(`<img src="${item.url}" width="250" style="border-radius:8px">`, { maxWidth: 260 });
                });
                
                // เลื่อนหน้าจอไปหาหมุดล่าสุดอัตโนมัติ
                if(data.length > 0) map.panTo([data[data.length-1].lat, data[data.length-1].lng]);
            });
    </script>
</body>
</html>
