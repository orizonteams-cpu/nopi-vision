<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload to Map</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .upload-card { background: #2d2d2d; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input[type="file"] { margin: 20px 0; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
        #status { margin-top: 15px; font-size: 14px; color: #60a5fa; }
    </style>
</head>
<body>
    <div class="upload-card">
        <h3>อัปโหลดรูปภาพเข้าแผนที่</h3>
        <input type="file" id="fileInput" accept="image/*" multiple>
        <button onclick="startBulkUpload()">เริ่มการอัปโหลด</button>
        <div id="status"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgjX6LNjOMlEodXpxw1R8p5Y97Znuql1m0V6JgX647YbjdpLg3r2kE46BBj_3vOZ-pLA/exec";

        async function startBulkUpload() {
            const files = document.getElementById('fileInput').files;
            const status = document.getElementById('status');
            if (files.length === 0) return alert("กรุณาเลือกไฟล์");

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                status.innerText = `กำลังจัดการรูปที่ ${i+1}/${files.length}: ${file.name}`;
                
                try {
                    const tags = await ExifReader.load(file);
                    const lat = tags['GPSLatitude']?.description;
                    const lng = tags['GPSLongitude']?.description;

                    if (!lat || !lng) {
                        console.warn(file.name + " ไม่มีพิกัด");
                        continue;
                    }

                    const base64 = await toBase64(file);
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ filename: file.name, base64: base64, lat, lng })
                    });
                } catch (e) { console.error(e); }
            }
            status.innerText = "อัปโหลดเสร็จสมบูรณ์!";
            setTimeout(() => window.location.href = "map.html", 2000);
        }

        const toBase64 = file => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
        });
    </script>
</body>
</html>
